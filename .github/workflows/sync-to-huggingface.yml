name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v6

      - name: Sync files to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: YogeshNamdev/ai-agent-remark
          huggingface_repo_id: Yogesh10101998/ai-agent-remark-enhance
          repo_type: space
          space_sdk: docker
          hf_token: ${{ secrets.HF_TOKEN }}
